<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>MultiView Player</title>
<style>
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: #000; overflow: hidden;
  }
  #player, #player iframe {
    position: absolute; inset: 0; width: 100%; height: 100%; border: 0;
  }
  #danmaku {
    position: fixed; inset: 0; overflow: hidden;
    pointer-events: none; z-index: 10;
  }
  .cmt {
    position: absolute; left: 100%; top: 0;
    white-space: nowrap;
    color: #fff;
    font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    font-size: clamp(12px, 4vmin, 22px);
    font-weight: 700;
    line-height: 1.2;
    text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
    will-change: transform;
  }
  #msg {
    position: absolute; left: 0; right: 0; bottom: 0;
    color: #bbb; background: rgba(0,0,0,0.6);
    font-family: sans-serif; font-size: 12px; padding: 6px 10px;
    z-index: 11; text-align: center;
  }
</style>
</head>
<body>
<div id="player"></div>
<div id="danmaku"></div>
<div id="msg" style="display:none"></div>

<script>
(function () {
  'use strict';

  var params = new URLSearchParams(location.search);
  var platform = (params.get('platform') || '').toLowerCase();
  var channel = params.get('channel') || '';
  var chatOn = params.get('chat') !== '0';
  var proxy = params.get('proxy') || '';

  var playerEl = document.getElementById('player');
  var danmakuEl = document.getElementById('danmaku');
  var msgEl = document.getElementById('msg');

  function showMsg(text) {
    msgEl.textContent = text;
    msgEl.style.display = 'block';
  }
  function viaProxy(url) {
    return proxy ? proxy + encodeURIComponent(url) : url;
  }

  // ---------- Video embed ----------
  function embedUrl() {
    var host = location.hostname;
    var ch = encodeURIComponent(channel);
    switch (platform) {
      case 'twitch':
        return 'https://player.twitch.tv/?channel=' + ch +
               '&parent=' + host + '&muted=true&autoplay=true';
      case 'kick':
        return 'https://player.kick.com/' + ch + '?autoplay=true&muted=true';
      case 'twitcasting':
        return 'https://twitcasting.tv/' + ch + '/embeddedplayer/live?auto_play=true';
      default:
        return '';
    }
  }

  function mountPlayer() {
    var url = embedUrl();
    if (!url) {
      showMsg('未対応のプラットフォームです: ' + platform);
      return;
    }
    var iframe = document.createElement('iframe');
    iframe.src = url;
    iframe.allow = 'autoplay; fullscreen; encrypted-media; picture-in-picture';
    iframe.setAttribute('allowfullscreen', 'true');
    iframe.setAttribute('scrolling', 'no');
    playerEl.appendChild(iframe);
  }

  // ---------- Danmaku engine ----------
  function Danmaku(root) {
    this.root = root;
    this.laneHeight = 30;
    this.speed = 0.13; // px per ms
    this.lanes = [];
    this.recompute();
    var self = this;
    window.addEventListener('resize', function () { self.recompute(); });
  }
  Danmaku.prototype.recompute = function () {
    this.w = this.root.clientWidth || window.innerWidth;
    this.h = this.root.clientHeight || window.innerHeight;
    var count = Math.max(1, Math.floor(this.h / this.laneHeight));
    if (count !== this.lanes.length) {
      this.lanes = new Array(count).fill(0);
    }
  };
  Danmaku.prototype.emit = function (text, color) {
    if (!text) return;
    var now = performance.now();
    var lane = -1;
    for (var i = 0; i < this.lanes.length; i++) {
      if (this.lanes[i] <= now) { lane = i; break; }
    }
    if (lane === -1) {
      // all lanes busy: reuse the soonest-free one (slight overlap)
      var min = Infinity;
      for (var j = 0; j < this.lanes.length; j++) {
        if (this.lanes[j] < min) { min = this.lanes[j]; lane = j; }
      }
    }
    var el = document.createElement('div');
    el.className = 'cmt';
    el.textContent = text;
    if (color) el.style.color = color;
    el.style.top = (lane * this.laneHeight) + 'px';
    this.root.appendChild(el);

    var tw = el.offsetWidth || (text.length * 16);
    var distance = this.w + tw + 8;
    var duration = distance / this.speed;
    // lane is "busy" until this comment's tail fully enters from the right edge
    this.lanes[lane] = now + (tw + 24) / this.speed;

    el.style.transition = 'transform ' + duration + 'ms linear';
    void el.offsetHeight; // force reflow so the start position is committed
    el.style.transform = 'translateX(' + (-distance) + 'px)';
    setTimeout(function () {
      if (el.parentNode) el.parentNode.removeChild(el);
    }, duration + 200);
  };

  var danmaku = new Danmaku(danmakuEl);

  // ---------- Chat: Twitch (anonymous IRC over WebSocket) ----------
  function parseIrcTags(raw) {
    var tags = {};
    raw.split(';').forEach(function (kv) {
      var idx = kv.indexOf('=');
      if (idx > -1) tags[kv.slice(0, idx)] = kv.slice(idx + 1);
    });
    return tags;
  }
  function connectTwitch() {
    var ch = channel.toLowerCase().replace(/^#/, '');
    var ws;
    function open() {
      ws = new WebSocket('wss://irc-ws.chat.twitch.tv:443');
      ws.onopen = function () {
        ws.send('CAP REQ :twitch.tv/tags');
        ws.send('PASS SCHMOOPIIE');
        ws.send('NICK justinfan' + Math.floor(Math.random() * 999999));
        ws.send('JOIN #' + ch);
      };
      ws.onmessage = function (e) {
        var lines = e.data.split('\r\n');
        for (var i = 0; i < lines.length; i++) {
          var line = lines[i];
          if (!line) continue;
          if (line.indexOf('PING') === 0) { ws.send('PONG :tmi.twitch.tv'); continue; }
          var tags = {};
          var rest = line;
          if (line[0] === '@') {
            var sp = line.indexOf(' ');
            tags = parseIrcTags(line.slice(1, sp));
            rest = line.slice(sp + 1);
          }
          if (rest.indexOf('PRIVMSG') === -1) continue;
          var msgIdx = rest.indexOf(' :', rest.indexOf('PRIVMSG'));
          if (msgIdx === -1) continue;
          var text = rest.slice(msgIdx + 2);
          danmaku.emit(text, tags.color || '');
        }
      };
      ws.onclose = function () { setTimeout(open, 3000); };
      ws.onerror = function () { try { ws.close(); } catch (x) {} };
    }
    open();
  }

  // ---------- Chat: Kick (Pusher) ----------
  function connectKick() {
    var apiUrl = 'https://kick.com/api/v2/channels/' + encodeURIComponent(channel);
    fetch(viaProxy(apiUrl), { headers: { 'Accept': 'application/json' } })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        var id = data && data.chatroom && data.chatroom.id;
        if (!id) { showMsg('Kick: チャンネル情報を取得できませんでした'); return; }
        subscribeKick(id);
      })
      .catch(function () {
        showMsg('Kick: チャット取得に失敗 (CORSプロキシ設定が必要かも)');
      });
  }
  function subscribeKick(chatroomId) {
    var ws;
    function open() {
      ws = new WebSocket('wss://ws-us2.pusher.com/app/32cbd69e4b950bf97679?protocol=7&client=js&version=8.4.0&flash=false');
      ws.onopen = function () {
        ws.send(JSON.stringify({
          event: 'pusher:subscribe',
          data: { auth: '', channel: 'chatrooms.' + chatroomId + '.v2' }
        }));
      };
      ws.onmessage = function (e) {
        var data;
        try { data = JSON.parse(e.data); } catch (x) { return; }
        if (data.event === 'App\\Events\\ChatMessageEvent') {
          var payload;
          try { payload = JSON.parse(data.data); } catch (x) { return; }
          var color = payload.sender && payload.sender.identity && payload.sender.identity.color;
          danmaku.emit(payload.content, color || '');
        }
      };
      ws.onclose = function () { setTimeout(open, 3000); };
      ws.onerror = function () { try { ws.close(); } catch (x) {} };
    }
    open();
  }

  // ---------- Chat: TwitCasting (unofficial, best-effort) ----------
  function connectTwitcasting() {
    var latestUrl = 'https://frontendapi.twitcasting.tv/users/' +
                    encodeURIComponent(channel) + '/latest-movie';
    fetch(viaProxy(latestUrl))
      .then(function (r) { return r.json(); })
      .then(function (data) {
        var movieId = data && data.movie && data.movie.id;
        if (!movieId) { showMsg('ツイキャス: 配信が見つかりません'); return; }
        var body = new URLSearchParams(); body.set('movie_id', movieId);
        return fetch(viaProxy('https://twitcasting.tv/eventpubsuburl.php'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: body.toString()
        });
      })
      .then(function (r) { return r ? r.json() : null; })
      .then(function (data) {
        var wss = data && data.url;
        if (!wss) { showMsg('ツイキャス: コメント接続URLを取得できません'); return; }
        subscribeTwitcasting(wss);
      })
      .catch(function () {
        showMsg('ツイキャス: コメント取得に失敗 (CORSプロキシ設定が必要かも)');
      });
  }
  function subscribeTwitcasting(wss) {
    var ws = new WebSocket(wss);
    ws.onmessage = function (e) {
      var arr;
      try { arr = JSON.parse(e.data); } catch (x) { return; }
      if (!Array.isArray(arr)) return;
      arr.forEach(function (item) {
        if (item && item.type === 'comment' && item.message) {
          danmaku.emit(item.message, '');
        }
      });
    };
    // The pubsub URL expires, so reconnect by re-running the whole lookup.
    ws.onclose = function () { setTimeout(connectTwitcasting, 5000); };
    ws.onerror = function () { try { ws.close(); } catch (x) {} };
  }

  // ---------- boot ----------
  mountPlayer();
  if (chatOn) {
    if (platform === 'twitch') connectTwitch();
    else if (platform === 'kick') connectKick();
    else if (platform === 'twitcasting') connectTwitcasting();
  }
})();
</script>
</body>
</html>
