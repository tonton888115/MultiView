<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>MultiView</title>
<style>
  html, body { margin:0; padding:0; width:100%; min-height:100%; background:#000; color:#fff; }
  body { font-family:-apple-system,BlinkMacSystemFont,sans-serif; overflow-y:auto; -webkit-overflow-scrolling:touch; }
  #grid { display:flex; flex-direction:column; gap:10px; padding:10px; box-sizing:border-box; }
  body.grid #grid { flex-direction:row; flex-wrap:wrap; align-content:flex-start; justify-content:center; }
  .cell { position:relative; width:100%; aspect-ratio:16/9; background:#000; overflow:hidden; border-radius:14px;
    border:1px solid rgba(255,255,255,0.16); }
  body.grid .cell { width:calc(50vw - 16px); }
  .cell iframe { position:absolute; inset:0; width:100%; height:100%; border:0; background:#000; }
  #audioStart { position:fixed; right:10px; bottom:10px; z-index:4; padding:10px 14px; border-radius:18px;
    border:1px solid rgba(255,255,255,0.25); background:rgba(18,24,32,0.76); color:#fff;
    font:700 13px -apple-system,BlinkMacSystemFont,sans-serif; }
  body.audio-started #audioStart { display:none; }
</style>
</head>
<body>
<div id="grid"></div>
<button id="audioStart">音声を開始</button>
<script>
(function () {
  'use strict';
  var P = new URLSearchParams(location.search);
  var layout = P.get('layout') || 'stacked';
  var audioOn = P.get('audio') === '1';
  var chatOn = P.get('chat') !== '0';
  var proxy = P.get('proxy') || '';
  var fs = P.get('fs') || '20';
  var sp = P.get('sp') || '0.13';
  var op = P.get('op') || '0.9';
  var ml = P.get('ml') || '0';
  var mlen = P.get('mlen') || '0';
  var raw = P.get('streams') || '';
  document.body.className = layout === 'grid' ? 'grid' : 'stacked';

  function parseStreams() {
    return raw.split(',').map(function (part) {
      var i = part.indexOf(':');
      if (i <= 0) return null;
      return { platform: part.slice(0, i), channel: decodeURIComponent(part.slice(i + 1)) };
    }).filter(Boolean);
  }
  function embedUrl(s) {
    var ch = encodeURIComponent(s.channel);
    if (s.platform === 'niconico') return 'https://live.nicovideo.jp/watch/' + ch;
    return 'https://tonton888115.github.io/MultiView/player.html?platform=' + encodeURIComponent(s.platform) +
      '&channel=' + ch +
      '&chat=' + (chatOn ? '1' : '0') +
      '&fs=' + encodeURIComponent(fs) +
      '&sp=' + encodeURIComponent(sp) +
      '&op=' + encodeURIComponent(op) +
      '&ml=' + encodeURIComponent(ml) +
      '&mlen=' + encodeURIComponent(mlen) +
      '&start=0' +
      '&audio=' + (audioOn ? '1' : '0') +
      (proxy ? '&proxy=' + encodeURIComponent(proxy) : '');
  }
  function keyOf(s) {
    return s.platform + ':' + String(s.channel).toLowerCase();
  }
  var grid = document.getElementById('grid');
  var audioStart = document.getElementById('audioStart');
  function applyVolume(key, volume) {
    var v = Math.max(0, Math.min(1, Number(volume) || 0));
    Array.prototype.forEach.call(document.querySelectorAll('iframe[data-key]'), function (frame) {
      if (frame.getAttribute('data-key') !== key) return;
      try { frame.contentWindow.postMessage({ type:'volume', volume:v }, '*'); } catch (e) {}
    });
  }
  window.addEventListener('message', function (event) {
    var data = event.data;
    if (typeof data === 'string') {
      try { data = JSON.parse(data); } catch (e) {}
    }
    if (data && data.type === 'volume' && data.key) applyVolume(data.key, data.volume);
  });
  function reloadFramesForGesture() {
    document.body.classList.add('audio-started');
    Array.prototype.forEach.call(document.querySelectorAll('iframe'), function (frame) {
      var src = frame.src;
      frame.src = 'about:blank';
      setTimeout(function () { frame.src = src; }, 40);
    });
  }
  audioStart.addEventListener('click', reloadFramesForGesture);
  audioStart.addEventListener('touchend', function (e) {
    e.preventDefault();
    reloadFramesForGesture();
  }, { passive:false });
  parseStreams().forEach(function (s) {
    var src = embedUrl(s);
    if (!src) return;
    var cell = document.createElement('div');
    cell.className = 'cell';
    var iframe = document.createElement('iframe');
    iframe.src = src;
    iframe.allow = 'autoplay; fullscreen; encrypted-media; picture-in-picture';
    iframe.setAttribute('allowfullscreen', 'true');
    iframe.setAttribute('playsinline', 'true');
    iframe.setAttribute('scrolling', 'no');
    iframe.setAttribute('data-key', keyOf(s));
    cell.appendChild(iframe);
    grid.appendChild(cell);
  });
})();
</script>
</body>
</html>
