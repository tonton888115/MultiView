<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>MultiView Chat</title>
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #18181b; overflow: hidden; }
  #chat, #chat iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
  #fallback {
    position: absolute; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7); color: #ddd; font-family: sans-serif;
    font-size: 12px; text-align: center; padding: 6px;
  }
  #fallback a { color: #9146ff; }
</style>
</head>
<body>
<div id="chat"></div>
<div id="fallback"></div>
<script>
(function () {
  var params = new URLSearchParams(location.search);
  var channel = params.get('channel') || '';
  var host = location.hostname;

  // Only Twitch needs this parent-restricted wrapper; other platforms load natively.
  var src = 'https://www.twitch.tv/embed/' + encodeURIComponent(channel) +
            '/chat?parent=' + host + '&darkpopout=true';

  var iframe = document.createElement('iframe');
  iframe.src = src;
  iframe.setAttribute('sandbox',
    'allow-storage-access-by-user-activation allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox allow-modals allow-forms');
  document.getElementById('chat').appendChild(iframe);

  // iOS の埋め込みチャットはログインで不調になることがあるためフォールバックを出す
  document.getElementById('fallback').innerHTML =
    'ログインできない場合は <a href="https://www.twitch.tv/popout/' +
    encodeURIComponent(channel) + '/chat" target="_blank" rel="noopener">Twitchで開く</a>';
})();
</script>
</body>
</html>
