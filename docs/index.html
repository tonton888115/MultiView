<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MultiView - player tester</title>
<style>
  body { margin: 0; font-family: sans-serif; background: #111; color: #eee; }
  header { padding: 12px 16px; background: #0c0c0c; border-bottom: 1px solid #222; }
  h1 { font-size: 16px; margin: 0; }
  form { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px 16px; align-items: center; }
  select, input { background: #222; color: #eee; border: 1px solid #444; border-radius: 6px; padding: 8px; }
  input[type=text] { min-width: 200px; }
  button { background: #0a84ff; color: #fff; border: 0; border-radius: 6px; padding: 9px 16px; font-weight: 600; }
  #frame { width: 100%; height: 70vh; border: 0; background: #000; display: block; }
  p.note { padding: 0 16px 12px; color: #999; font-size: 13px; line-height: 1.5; }
</style>
</head>
<body>
<header><h1>MultiView player tester</h1></header>
<form id="f">
  <select id="platform">
    <option value="twitch">Twitch</option>
    <option value="kick">Kick</option>
    <option value="twitcasting">ツイキャス</option>
  </select>
  <input type="text" id="channel" placeholder="チャンネル名 / ユーザーID" />
  <input type="text" id="proxy" placeholder="CORSプロキシ (任意) https://xxx.workers.dev/?url=" />
  <label><input type="checkbox" id="chat" checked /> 弾幕</label>
  <button type="submit">表示</button>
</form>
<p class="note">
  この画面は動作確認用です。Twitchはそのまま弾幕が出ます。Kick/ツイキャスのコメントはCORSプロキシ設定が必要な場合があります。
  ニコ生(ライブ)は埋め込み非対応のため、アプリ側では番組ページを直接開きます。
</p>
<iframe id="frame" allow="autoplay; fullscreen; encrypted-media; picture-in-picture"></iframe>

<script>
  document.getElementById('f').addEventListener('submit', function (e) {
    e.preventDefault();
    var platform = document.getElementById('platform').value;
    var channel = document.getElementById('channel').value.trim();
    var proxy = document.getElementById('proxy').value.trim();
    var chat = document.getElementById('chat').checked ? '1' : '0';
    if (!channel) return;
    var q = 'platform=' + encodeURIComponent(platform) +
            '&channel=' + encodeURIComponent(channel) +
            '&chat=' + chat;
    if (proxy) q += '&proxy=' + encodeURIComponent(proxy);
    document.getElementById('frame').src = 'player.html?' + q;
  });
</script>
</body>
</html>
