name: Build iOS (unsigned IPA)

# Produces an UNSIGNED .ipa as a downloadable artifact.
# Install it on your iPhone with Sideloadly (it re-signs with your free Apple ID).

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'MultiView/**'
      - 'docs/**'
      - '.github/workflows/build-ios.yml'

concurrency:
  group: build-ios-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

jobs:
  build:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: MultiView

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install JS dependencies
        run: npm ci

      - name: Install Ruby gems (CocoaPods)
        run: bundle install

      - name: Pod install
        working-directory: MultiView/ios
        run: bundle exec pod install

      - name: Build unsigned app
        working-directory: MultiView/ios
        run: |
          xcodebuild \
            -workspace MultiView.xcworkspace \
            -scheme MultiView \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ONLY_ACTIVE_ARCH=NO \
            clean build

      - name: Package into .ipa
        working-directory: MultiView/ios/build/Build/Products/Release-iphoneos
        run: |
          mkdir -p Payload
          cp -R MultiView.app Payload/
          zip -qry MultiView.ipa Payload
          ls -lh MultiView.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: MultiView-unsigned-ipa
          path: MultiView/ios/build/Build/Products/Release-iphoneos/MultiView.ipa
          if-no-files-found: error
          retention-days: 1

      - name: Delete old IPA artifacts and workflow runs
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const artifactName = 'MultiView-unsigned-ipa';

            let artifacts = [];
            for (let attempt = 0; attempt < 3; attempt++) {
              artifacts = await github.paginate(github.rest.actions.listArtifactsForRepo, {
                owner,
                repo,
                per_page: 100,
              });
              if (artifacts.some((artifact) => artifact.name === artifactName && artifact.workflow_run?.id === context.runId)) {
                break;
              }
              await new Promise((resolve) => setTimeout(resolve, 3000));
            }

            for (const artifact of artifacts) {
              if (artifact.name === artifactName && artifact.workflow_run?.id === context.runId) {
                continue;
              }
              await github.rest.actions.deleteArtifact({
                owner,
                repo,
                artifact_id: artifact.id,
              });
            }

            const runs = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, {
              owner,
              repo,
              per_page: 100,
            });
            for (const run of runs) {
              if (run.id === context.runId || run.status === 'in_progress' || run.status === 'queued') {
                continue;
              }
              try {
                await github.rest.actions.deleteWorkflowRun({
                  owner,
                  repo,
                  run_id: run.id,
                });
              } catch (error) {
                core.warning(`Could not delete workflow run ${run.id}: ${error.message}`);
              }
            }
